# tenebraos.org — main site (PROXIED through Cloudflare / orange cloud)
# Headers + clean URLs translated from dist/_headers + dist/_redirects,
# which are Cloudflare Pages-specific and do nothing under nginx.
#
# TLS: site is behind the Cloudflare proxy — use a Cloudflare Origin
# Certificate (dashboard → SSL/TLS → Origin Server → Create; 15-year validity)
# and set the zone to Full (strict). Paths below assume that. If you ever run
# this grey-clouded instead, swap in certbot paths.

server {
    listen 80;
    listen [::]:80;
    server_name tenebraos.org www.tenebraos.org;
    return 301 https://tenebraos.org$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tenebraos.org www.tenebraos.org;

    ssl_certificate     /etc/nginx/ssl/tenebraos.org.origin.pem;
    ssl_certificate_key /etc/nginx/ssl/tenebraos.org.origin.key;

    root /var/www/tenebraos.org/dist;
    index index.html;

    # ── security headers (mirror of dist/_headers — keep in sync) ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # ── clean URLs (mirror of dist/_redirects) ──
    location = /keybinds { try_files /keybinds.html =404; }
    location = /docs     { try_files /docs.html =404; }
    # real 302 so the #download fragment actually works (fixes the Pages nit)
    location = /download { return 302 /#download; }

    # ── caching ──
    location ~* \.(css|js|png|svg|jpg|webp|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
}
