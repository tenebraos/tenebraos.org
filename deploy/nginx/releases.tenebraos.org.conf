# releases.tenebraos.org — ISO + signatures (DNS-ONLY / grey cloud)
#
# Deliberately NOT behind the Cloudflare proxy: the free-plan cache caps at
# 512MB per object, so a 4.8GB ISO would stream through Cloudflare on every
# download with zero benefit. Grey-clouded, the VPS serves it directly at
# full NIC speed and Cloudflare is out of the path entirely.
#
# TLS: grey cloud means real certs — certbot --nginx -d releases.tenebraos.org
# (paths below are certbot's defaults).

server {
    listen 80;
    listen [::]:80;
    server_name releases.tenebraos.org;
    # allow ACME before forcing TLS
    location /.well-known/acme-challenge/ { root /var/www/acme; }
    location / { return 301 https://releases.tenebraos.org$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name releases.tenebraos.org;

    ssl_certificate     /etc/letsencrypt/live/releases.tenebraos.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/releases.tenebraos.org/privkey.pem;

    root /var/www/releases;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # browsable directory listing — doubles as a poor-man's release index
    autoindex on;
    autoindex_exact_size off;

    # efficient large-file serving; Range (resume) support is automatic
    sendfile on;
    tcp_nopush on;

    location ~* \.iso$ {
        # versioned artifacts never change → immutable
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # full speed for the first 64MB, then 30MB/s per connection —
        # keeps one aggressive parallel downloader from owning the box.
        # Tune or delete to taste.
        limit_rate_after 64m;
        limit_rate 30m;
    }

    location ~* \.(asc|sha256|sig)$ {
        add_header Cache-Control "public, max-age=3600" always;
        default_type text/plain;
    }

    # never serve dotfiles or stray uploads
    location ~ /\. { deny all; }
}
